kind = "web"
previewPath = "/"
title = "AL MURTAZA INTERNATIONAL PHARMA"
version = "1.0.0"
id = "artifacts/almurtaza-pharma"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18779

[services.development]
run = "pnpm --filter @workspace/almurtaza-pharma run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/almurtaza-pharma", "run", "build" ]
publicDir = "artifacts/almurtaza-pharma/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18779"
BASE_PATH = "/"
